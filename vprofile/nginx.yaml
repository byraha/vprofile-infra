apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: vprofile
data:
  default.conf: |
    upstream vproapp {
      server app01:8080;
    }
    server {
      listen 80;
      location / {
        proxy_pass http://vproapp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: vproapp-nginx
  namespace: vprofile
spec:
  type: NodePort
  selector:
    app: vprofile
    tier: nginx
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: vprofile
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vprofile
      tier: nginx
  template:
    metadata:
      labels:
        app: vprofile
        tier: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
