apiVersion: v1
kind: Service
metadata:
  name: mc01
  namespace: vprofile
spec:
  selector:
    app: vprofile
    tier: memcached
  ports:
    - protocol: TCP
      port: 11211
      targetPort: 11211
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memcached
  namespace: vprofile
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vprofile
      tier: memcached
  template:
    metadata:
      labels:
        app: vprofile
        tier: memcached
    spec:
      containers:
        - name: memcached
          image: memcached:1.6
          args:
            - -m
            - "128"
          ports:
            - containerPort: 11211
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
